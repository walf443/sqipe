name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-qbey:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate crates.io token
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish qbey to crates.io
        run: cargo publish -p qbey
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-qbey-mysql:
    runs-on: ubuntu-latest
    needs: publish-qbey
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate crates.io token
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish qbey-mysql to crates.io
        run: cargo publish -p qbey-mysql
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}


  github-release:
    runs-on: ubuntu-latest
    needs: [publish-qbey, publish-qbey-mysql]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
