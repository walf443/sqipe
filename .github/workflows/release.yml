name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-qbey:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate crates.io token
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: auth

      - name: Publish qbey to crates.io
        run: cargo publish -p qbey
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-qbey-mysql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: publish-qbey
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate crates.io token
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: auth

      - name: Publish qbey-mysql to crates.io
        run: cargo publish -p qbey-mysql
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}


  github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [publish-qbey, publish-qbey-mysql]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
